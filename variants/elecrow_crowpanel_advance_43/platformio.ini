# CrowPanel Advance 4.3" (RGB-parallel 800x480). RGB tier -- shares the board platform
# (variants/crowpanel_advance_common) with the CROWPANEL_RGB branch. LoRa module pins are the
# Meshtastic CROW_SELECT!=1 set (LoRa shares the SD SPI bus: SCK5/MISO4/MOSI6, CS differs).
# BLIND BUILD: untested -- RGB timings/data-pin order, GT911 addr, and backlight-expander all need
# on-device bring-up (see CrowPanelLGFX.h + CrowPanelBoard.cpp VERIFY/TODO notes).
# Build scripts + the shared [meshcore_lvgl] gui_version live in variants/elecrow_crowpanel_advance_35.

[elecrow_crowpanel_advance_43]
extends = esp32_base
board = esp32-s3-devkitc-1
upload_speed = 115200
upload_flags = --no-stub
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
extra_scripts =
  ${esp32_base.extra_scripts}
  pre:variants/elecrow_crowpanel_advance_35/build_version.py
  post:variants/elecrow_crowpanel_advance_35/ota_md5.py
  post:variants/elecrow_crowpanel_advance_35/merge_factory.py
  post:tools/dev_ota_stage.py
build_flags =
  ${esp32_base.build_flags}
  -I variants/elecrow_crowpanel_advance_43
  -I variants/crowpanel_advance_common
  -D ELECROW_CROWPANEL_ADVANCE_43
  -D CROWPANEL_RGB                ; RGB-parallel display tier (board-platform branch)
  -D BOARD_HAS_PSRAM=1
  -D LVGL_GUI_VERSION=\"${meshcore_lvgl.gui_version}\"
  -D OTA_GH_OWNER=\"ksanislo\"
  -D OTA_GH_REPO=\"MeshCore-LVGL\"
  -D OTA_ASSET_PREFIX=\"elecrow_crowpanel_advance_43_companion_radio_lvgl\"
  -D OTA_RELEASES_PER_PAGE=10
  -D ENABLE_PSRAM_CONTACTS
  -D ENABLE_PSRAM_OFFLINE_QUEUE
  -D ENABLE_LOGIN_STORE
  -D CORE_DEBUG_LEVEL=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CROWPANEL_TFT_ROTATION=0     ; 800x480 native landscape
  ; LoRa SX1262 -- Meshtastic CROW_SELECT!=1 pin set (shares SD SPI bus 5/4/6, CS differs)
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8f
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D P_LORA_NSS=0
  -D P_LORA_SCLK=5
  -D P_LORA_MISO=4
  -D P_LORA_MOSI=6
  -D P_LORA_RESET=19
  -D P_LORA_BUSY=2
  -D P_LORA_DIO_1=20
  -D PIN_BUZZER=8                ; defined globally (CrowPanelBoard.h also defaults it); GPIO8 free on RGB
  ; SD shares the LoRa SPI bus (same SCK/MISO/MOSI, separate CS).
  -D PIN_SD_SCK=5
  -D PIN_SD_MISO=4
  -D PIN_SD_MOSI=6
  -D PIN_SD_CS=7
  -D ENV_INCLUDE_GPS=0
  -D ENV_INCLUDE_AHTX0=0
  -D ENV_INCLUDE_BME280=0
  -D ENV_INCLUDE_BMP280=0
  -D ENV_INCLUDE_SHTC3=0
  -D ENV_INCLUDE_SHT4X=0
  -D ENV_INCLUDE_LPS22HB=0
  -D ENV_INCLUDE_INA3221=0
  -D ENV_INCLUDE_INA219=0
  -D ENV_INCLUDE_INA226=0
  -D ENV_INCLUDE_INA260=0
  -D ENV_INCLUDE_MLX90614=0
  -D ENV_INCLUDE_VL53L0X=0
  -D HAS_SD_CARD
  -D SDFAT_FILE_TYPE=3
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/crowpanel_advance_common>
lib_deps =
  ${esp32_base.lib_deps}
  greiman/SdFat @ ^2.2.3
  stevemarple/MicroNMEA @ ^2.0.6
  end2endzone/NonBlockingRTTTL@^1.3.0

[env:elecrow_crowpanel_advance_43_companion_radio_lvgl]
extends = elecrow_crowpanel_advance_43
build_flags =
  ${elecrow_crowpanel_advance_43.build_flags}
  -D DISPLAY_CLASS=CrowPanelDisplay
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D MESH_PROXY
  -D WITH_WIFI
  -D WITH_MQTT_BRIDGE
  -I examples/companion_radio
  -I examples/companion_radio_lvgl
  -I examples/companion_radio_lvgl/ui-lvgl
build_src_filter = ${elecrow_crowpanel_advance_43.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/sensors/*.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<helpers/ui/buzzer.cpp>
  +<helpers/bridges/MqttBridge.cpp>
  +<../examples/companion_radio/MyMesh.cpp>
  +<../examples/companion_radio/DataStore.cpp>
  +<../examples/companion_radio/CompanionMqtt.cpp>
  +<../examples/companion_radio/RadioPresetStore.cpp>
  +<../examples/companion_radio/main.cpp>
  +<../examples/companion_radio_lvgl/ui-lvgl/*.cpp>
lib_deps =
  ${elecrow_crowpanel_advance_43.lib_deps}
  densaugeo/base64 @ ~1.4.0
  lovyan03/LovyanGFX @ ^1.2.7
  lvgl/lvgl @ ~8.3.11
  knolleary/PubSubClient @ ^2.8
