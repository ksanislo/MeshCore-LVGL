# Shared version for ALL LVGL companion variants (CrowPanel, T-Deck, ...). One bump per release here
# keeps every variant in lockstep; each variant ships as its own <OTA_ASSET_PREFIX>-<ver>-<sha>.bin
# asset in the same GitHub release. (extra_configs merges every variants/*/platformio.ini, so the
# T-Deck env references this too.)
[meshcore_lvgl]
gui_version = 0.3.0

[elecrow_crowpanel_advance_35]
extends = esp32_base
board = esp32-s3-devkitc-1
upload_speed = 115200
upload_flags = --no-stub
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
extra_scripts =
  ${esp32_base.extra_scripts}
  pre:variants/elecrow_crowpanel_advance_35/build_version.py
  post:variants/elecrow_crowpanel_advance_35/ota_md5.py
  post:variants/elecrow_crowpanel_advance_35/merge_factory.py
  post:tools/dev_ota_stage.py
build_flags =
  ${esp32_base.build_flags}
  -I variants/elecrow_crowpanel_advance_35
  -D ELECROW_CROWPANEL_ADVANCE_35
  -D BOARD_HAS_PSRAM=1
  -D LVGL_GUI_VERSION=\"${meshcore_lvgl.gui_version}\" ; shared across variants; bump in [meshcore_lvgl]
  ; GitHub-release OTA: which repo to query + which release asset is ours (matched by exact name).
  -D OTA_GH_OWNER=\"ksanislo\"
  -D OTA_GH_REPO=\"MeshCore-LVGL\"
  ; Our board's release asset PREFIX = the PlatformIO env name (matches MeshCore's per-board naming).
  ; The OTA picker matches "<prefix>...*.bin" (excluding the -merged factory image), so release assets
  ; can carry a version+sha suffix (e.g. <prefix>-0.2.0-rc5-<sha>.bin) and still be found.
  -D OTA_ASSET_PREFIX=\"elecrow_crowpanel_advance_35_companion_radio_lvgl\"
  -D OTA_RELEASES_PER_PAGE=10       ; cap the GitHub releases query (bounds the JSON we parse)
  -D ENABLE_PSRAM_CONTACTS        ; keep the ~64KB contacts table in PSRAM, not internal SRAM
  -D ENABLE_PSRAM_OFFLINE_QUEUE   ; ...and the ~44KB offline message queue (OFFLINE_QUEUE_SIZE=256)
  -D ENABLE_LOGIN_STORE           ; persist repeater/room logins on-device for silent auto-login
  -D CORE_DEBUG_LEVEL=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  ; LoRa: SX1262, on-board
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8f
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D P_LORA_NSS=0
  -D P_LORA_SCLK=10
  -D P_LORA_MISO=9
  -D P_LORA_MOSI=3
  -D P_LORA_RESET=2
  -D P_LORA_BUSY=46
  -D P_LORA_DIO_1=1
  ; Buzzer on GPIO8 (matches CrowPanelBoard.h #ifndef default). Defining it here
  ; makes the #ifdef PIN_BUZZER paths -- buzzer.cpp + UITask notifications -- compile
  ; in (CrowPanelBoard.h is not included in those TUs, so a -D flag is required).
  -D PIN_BUZZER=8
  ; Optional GPS on UART1 routed to the OTHER UART socket (IO17/IO18 -- more reliable
  ; power than the rear plug). No module is required: initBasicGPS() probes the port at
  ; boot and disables itself if nothing answers, and gps_enabled defaults off. If a
  ; connected module reads nothing, swap PIN_GPS_RX/PIN_GPS_TX. setPins(PIN_GPS_TX,
  ; PIN_GPS_RX) => ESP RX=PIN_GPS_TX (IO18), ESP TX=PIN_GPS_RX (IO17).
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_RX=17          ; UART1 socket: ESP TX  -> GPS RX (IO17)
  -D PIN_GPS_TX=18          ; UART1 socket: ESP RX <-  GPS TX (IO18)
  -D PIN_GPS_RX_ALT=43      ; UART0 socket (rear plug): ESP TX  -> GPS RX (IO43 = U0TXD)
  -D PIN_GPS_TX_ALT=44      ; UART0 socket (rear plug): ESP RX <-  GPS TX (IO44 = U0RXD)
  -D GPS_BAUD_RATE=9600
  ; Other sensors off (CrowPanel has no environmental sensors on-board)
  -D ENV_INCLUDE_AHTX0=0
  -D ENV_INCLUDE_BME280=0
  -D ENV_INCLUDE_BMP280=0
  -D ENV_INCLUDE_SHTC3=0
  -D ENV_INCLUDE_SHT4X=0
  -D ENV_INCLUDE_LPS22HB=0
  -D ENV_INCLUDE_INA3221=0
  -D ENV_INCLUDE_INA219=0
  -D ENV_INCLUDE_INA226=0
  -D ENV_INCLUDE_INA260=0
  -D ENV_INCLUDE_MLX90614=0
  -D ENV_INCLUDE_VL53L0X=0
  ; BME680/BMP085 use #ifdef (not #if), so leave them undefined to disable.
  ; SD card (SdFat) -- FAT16/32 + exFAT so large (>32GB) cards mount as-is.
  ; HAS_SD_CARD gates SD-dependent features so the LVGL UI still builds on
  ; boards that have ESP32+LoRa+display but no SD slot (falls back to RAM store).
  -D HAS_SD_CARD
  -D SDFAT_FILE_TYPE=3
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/elecrow_crowpanel_advance_35>
lib_deps =
  ${esp32_base.lib_deps}
  greiman/SdFat @ ^2.2.3
  stevemarple/MicroNMEA @ ^2.0.6   ; for the optional UART GPS (ENV_INCLUDE_GPS)
  end2endzone/NonBlockingRTTTL@^1.3.0   ; buzzer notification chimes (PIN_BUZZER)

# Single CrowPanel LVGL build. BLE companion (phone app) + WiFi/MQTT, switched at runtime (they can't
# coexist on this RAM budget; WiFi mode runs the companion over USB serial). We don't ship a separate
# no-BLE "_usb" variant -- phone-app support is required, so this is the one series.
[env:elecrow_crowpanel_advance_35_companion_radio_lvgl]
extends = elecrow_crowpanel_advance_35
build_flags =
  ${elecrow_crowpanel_advance_35.build_flags}
  -D DISPLAY_CLASS=CrowPanelDisplay
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D MESH_PROXY
  -D WITH_WIFI
  -D WITH_MQTT_BRIDGE
  -I examples/companion_radio
  -I examples/companion_radio_lvgl
  -I examples/companion_radio_lvgl/ui-lvgl
build_src_filter = ${elecrow_crowpanel_advance_35.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/sensors/*.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<helpers/ui/buzzer.cpp>
  +<helpers/bridges/MqttBridge.cpp>
  +<../examples/companion_radio/MyMesh.cpp>
  +<../examples/companion_radio/DataStore.cpp>
  +<../examples/companion_radio/CompanionMqtt.cpp>
  +<../examples/companion_radio/RadioPresetStore.cpp>
  +<../examples/companion_radio/main.cpp>
  +<../examples/companion_radio_lvgl/ui-lvgl/*.cpp>
lib_deps =
  ${elecrow_crowpanel_advance_35.lib_deps}
  densaugeo/base64 @ ~1.4.0
  lovyan03/LovyanGFX @ ^1.2.7
  lvgl/lvgl @ ~8.3.11
  knolleary/PubSubClient @ ^2.8
